name: Get version information task

on:
  workflow_call:
    inputs:
      # Git ref to check out and version. Empty falls back to the caller's default checkout ref (`github.ref`); the
      # publisher passes an explicit branch so a scheduled run can still compute versions for `develop`.
      ref:
        required: false
        type: string
        default: ''
      # Logical branch NBGV classifies public-vs-prerelease against. With IGNORE_GITHUB_REF, NBGV reads the
      # checked-out git branch; callers that check out a pinned commit (detached HEAD - the build jobs) pass this
      # so a local branch can be created at that commit, giving NBGV the right name. Empty leaves the checkout as-is.
      branch:
        required: false
        type: string
        default: ''
    outputs:
      SemVer2:
        value: ${{ jobs.get-version.outputs.SemVer2 }}
      AssemblyVersion:
        value: ${{ jobs.get-version.outputs.AssemblyVersion }}
      AssemblyFileVersion:
        value: ${{ jobs.get-version.outputs.AssemblyFileVersion }}
      AssemblyInformationalVersion:
        value: ${{ jobs.get-version.outputs.AssemblyInformationalVersion }}
      # Full SHA of the commit the version was computed from, used to pin the release tag to the exact built commit.
      GitCommitId:
        value: ${{ jobs.get-version.outputs.GitCommitId }}

jobs:

  get-version:
    name: Get version information job
    runs-on: ubuntu-latest
    outputs:
      SemVer2: ${{ steps.nbgv.outputs.SemVer2 }}
      AssemblyVersion: ${{ steps.nbgv.outputs.AssemblyVersion }}
      AssemblyFileVersion: ${{ steps.nbgv.outputs.AssemblyFileVersion }}
      AssemblyInformationalVersion: ${{ steps.nbgv.outputs.AssemblyInformationalVersion }}
      GitCommitId: ${{ steps.nbgv.outputs.GitCommitId }}

    steps:

      - name: Setup .NET SDK step
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.x

      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      # NBGV (with IGNORE_GITHUB_REF) classifies public-vs-prerelease from the checked-out branch. A pinned-SHA
      # checkout is detached HEAD, where NBGV sees no branch and treats every leg as prerelease (the main leg would
      # then build a prerelease package mismatching its clean release tag). Force a local branch at HEAD matching the
      # logical branch so NBGV sees the right name while still versioning the intended commit.
      - name: Pin logical branch step
        if: ${{ inputs.branch != '' }}
        env:
          BRANCH: ${{ inputs.branch }}
        run: git checkout -B "$BRANCH"

      # nbgv is floated on @master: its tag stream lags master, so Dependabot tag-tracking would propose a downgrade.
      # Revisit if dotnet/nbgv resumes regular tagged releases.
      - name: Run Nerdbank.GitVersioning tool step
        id: nbgv
        uses: dotnet/nbgv@master
        env:
          # NBGV's GitHub Actions cloud-build provider overrides the checked-out branch with GITHUB_REF (the dispatch
          # ref). On a publish dispatched from the default branch that misclassifies every matrix leg as the public ref
          # and strips the prerelease suffix. GITHUB_REF is reserved and cannot be reliably overridden, so tell NBGV to
          # ignore it and version from the actually-checked-out branch (each leg checks out its own branch).
          IGNORE_GITHUB_REF: true
