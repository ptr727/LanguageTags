name: Publish project release action

# Branch-scoped self-publisher. A push to main or develop publishes that branch when it changes a shipped
# input, decided by the on.push.paths inclusion list below: the library source, the embedded data, the
# version floor, or the build configuration. The list is inclusion-only, so add a path here if a new input
# starts affecting the shipped package. Dependency bumps (Directory.Packages.props) and GitHub Actions
# bumps are deliberately not listed, so routine Dependabot churn never republishes; ship a dependency
# update by promoting develop to main or by dispatching. (A path filter cannot target a single package;
# the one shipped runtime dependency, Microsoft.Extensions.Logging.Abstractions, is an abstraction that
# changes rarely, so it rides the next promotion or a dispatch rather than warranting per-package
# detection.) A manual dispatch force-publishes the branch it ran on. main publishes a stable release,
# develop a prerelease. The merge-bot merges with an App token, so its merge commits reach this push
# trigger. The publish job needs the same validate-task the PR gate runs, so nothing publishes that would
# fail validation - on any path, dispatch or force-push included.
on:
  push:
    branches: [main, develop]
    paths:
      - 'LanguageTags/**'
      - 'LanguageData/**'
      - 'version.json'
      - 'Directory.Build.props'
  workflow_dispatch:

# Ref-independent group so concurrent publishes serialize, and cancel-in-progress: false so a publish is
# never cancelled mid-release (a half-created GitHub release or partial NuGet push).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # The same unit-test + lint gate the PR runs. The publish job needs it, so a failing test or lint blocks
  # the release.
  validate:
    name: Validate job
    uses: ./.github/workflows/validate-task.yml

  # Build, version, test-gated, push, release the triggering branch. Grants the write scopes
  # build-release-task needs (it declares none, so the smoke caller is not forced to over-grant). push is
  # already limited to main/develop; the if-guard covers workflow_dispatch, which can target any branch.
  publish:
    name: Publish project release job
    needs: validate
    if: ${{ github.event_name == 'push' || github.ref_name == 'main' || github.ref_name == 'develop' }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      actions: write
    with:
      publish: true
      smoke: false
