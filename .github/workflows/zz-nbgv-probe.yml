name: NBGV ref probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    name: Probe nbgv ref handling
    strategy:
      fail-fast: false
      matrix:
        branch: [ main, develop ]
        ignore: [ 'true', 'false' ]
    runs-on: ubuntu-latest
    steps:
      - name: Setup .NET SDK step
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.x
      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
      - name: Run nbgv action step
        id: nbgv
        uses: dotnet/nbgv@master
        env:
          IGNORE_GITHUB_REF: ${{ matrix.ignore }}
      - name: Report step
        run: |
          echo "PROBE-RESULT branch=${{ matrix.branch }} ignore=${{ matrix.ignore }} PublicRelease=${{ steps.nbgv.outputs.PublicRelease }} SemVer2=${{ steps.nbgv.outputs.SemVer2 }}"
