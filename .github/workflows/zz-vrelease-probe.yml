name: validate-release smoke probe

on:
  push:
    branches: [ fix/validate-release-skip-smoke ]

permissions:
  contents: read

jobs:
  smoke-main:
    name: Smoke probe main base
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    with:
      smoke: true
      github: false
      nuget: false
      ref: fix/validate-release-skip-smoke
      branch: main

  smoke-develop:
    name: Smoke probe develop base
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    with:
      smoke: true
      github: false
      nuget: false
      ref: fix/validate-release-skip-smoke
      branch: develop
